include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # Treat deprecated API usage as info (not blocking CI)
    deprecated_member_use: info
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    # Suppress noisy style suggestions that don't affect functionality
    use_super_parameters: false
    unnecessary_const: false
    unnecessary_this: false
    unnecessary_brace_in_string_interps: false
    prefer_final_fields: false
    avoid_print: false
